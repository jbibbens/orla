# vLLM variant of the workflow demo stack (heavy + light models, Orla).
# Same memory split as SGLang demo: heavy 0.60, light 0.35 (single GPU).
# Run from repo root:
#   docker compose -f deploy/docker-compose.workflow-demo.vllm.yaml up -d
#   VLLM_LIGHT_URL=http://vllm-light:8000/v1 VLLM_HEAVY_URL=http://vllm-heavy:8000/v1 go run ./examples/workflow_demo/cmd/workflow_demo
# Or from host: ORLA_URL=http://localhost:8081 VLLM_LIGHT_URL=http://localhost:8001/v1 VLLM_HEAVY_URL=http://localhost:8000/v1 go run ...
# Then: docker compose -f deploy/docker-compose.workflow-demo.vllm.yaml down
# Requires GPU. Uses separate project from SGLang workflow-demo to avoid conflicts.

services:
  vllm-heavy:
    image: vllm/vllm-openai:latest
    container_name: workflow-demo-vllm-heavy
    ports:
      - "8000:8000"
    volumes:
      - workflow_demo_vllm_cache:/root/.cache/huggingface
    environment:
      - HF_TOKEN=${HF_TOKEN:-}
    command:
      - "--model"
      - "${VLLM_HEAVY_MODEL:-Qwen/Qwen3-8B}"
      - "--gpu-memory-utilization"
      - "${VLLM_HEAVY_GPU_UTIL:-0.60}"
      - "--enable-auto-tool-choice"
      - "--tool-call-parser"
      - "hermes"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8000"
    ipc: host
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 120s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  vllm-light:
    image: vllm/vllm-openai:latest
    container_name: workflow-demo-vllm-light
    ports:
      - "8001:8000"
    volumes:
      - workflow_demo_vllm_cache:/root/.cache/huggingface
    environment:
      - HF_TOKEN=${HF_TOKEN:-}
    command:
      - "--model"
      - "${VLLM_LIGHT_MODEL:-Qwen/Qwen3-4B-Instruct-2507}"
      - "--gpu-memory-utilization"
      - "${VLLM_LIGHT_GPU_UTIL:-0.35}"
      - "--enable-auto-tool-choice"
      - "--tool-call-parser"
      - "hermes"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8000"
    ipc: host
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 90s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  orla:
    build:
      context: ..
      dockerfile: Dockerfile
    image: orla:latest
    container_name: workflow-demo-orla-vllm
    ports:
      - "8081:8081"
    command: ["serve", "--config", "/config/orla.yaml"]
    volumes:
      - ./orla-vllm.yaml:/config/orla.yaml:ro
    depends_on:
      vllm-heavy:
        condition: service_healthy
      vllm-light:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8081/api/v1/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    restart: unless-stopped

volumes:
  workflow_demo_vllm_cache: {}
