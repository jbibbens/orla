# DAG-Math memory management evaluation: SGLang + Orla + experiment runner.
# Run from repo root:
#   docker compose -f deploy/docker-compose.dag-math.yaml build
#   mkdir -p deploy/output
#   RUN_TARGET=dag_math_flush_per_workflow docker compose -f deploy/docker-compose.dag-math.yaml up
# Flush per request: RUN_TARGET=dag_math_flush_per_request docker compose ...
# Output: deploy/output/metrics.json, deploy/output/results.json. Requires GPU for SGLang.

services:
  sglang:
    image: lmsysorg/sglang:latest
    container_name: dag-math-sglang
    ports:
      - "30000:30000"
    environment:
      - HF_TOKEN=${HF_TOKEN:-}
    volumes:
      - sglang_cache:/root/.cache/huggingface
    entrypoint: ["python3", "-m", "sglang.launch_server"]
    command:
      - "--model-path"
      - "${SGLANG_MODEL:-Qwen/Qwen3-8B}"
      - "--tool-call-parser"
      - "qwen"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "30000"
      - "--mem-fraction-static"
      - "${SGLANG_MEM_FRACTION:-0.85}"
    ulimits:
      memlock: -1
      stack: 67108864
    ipc: host
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:30000/health"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 120s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  orla:
    build:
      context: ..
      dockerfile: Dockerfile
    image: orla:latest
    container_name: dag-math-orla
    ports:
      - "8081:8081"
    command: ["serve", "--config", "/config/orla.yaml"]
    volumes:
      - ./orla-sglang.yaml:/config/orla.yaml:ro
    depends_on:
      sglang:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8081/api/v1/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  run:
    build:
      context: ..
      dockerfile: examples/dag_math_eval/Dockerfile
    image: orla-dag-math-eval:latest
    container_name: dag-math-run
    environment:
      - ORLA_URL=http://orla:8081
      - SGLANG_URL=http://sglang:30000/v1
      - SGLANG_MODEL=${SGLANG_MODEL:-Qwen/Qwen3-8B}
      - MAX_INSTANCES=${MAX_INSTANCES:-}
      - METRICS_PATH=/output/metrics.json
      - OUTPUT_PATH=/output/results.json
      - EXPERIMENT_MODE=${EXPERIMENT_MODE:-flush_per_workflow}
      - RUN_TARGET=${RUN_TARGET:-dag_math_flush_per_workflow}
    volumes:
      - ./output:/output
    depends_on:
      orla:
        condition: service_healthy

volumes:
  sglang_cache: {}
