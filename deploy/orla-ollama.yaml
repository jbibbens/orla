# Orla agentic daemon config for use with docker-compose.ollama.yaml.
# The daemon talks to Ollama at http://ollama:11434 (service name from compose).

agentic_serving:
  mode: daemon
  daemon:
    listen_address: "0.0.0.0:8081"
  llm_servers:
    - name: "ollama"
      backend:
        type: "ollama"
        endpoint: "http://ollama:11434"
      model: "ollama:llama3.2:3b"
      context:
        shared: false
      cache:
        policy: "preserve"
  agent_profiles:
    - name: "default"
      llm_server: "ollama"
      inference:
        temperature: 0.7
        max_tokens: 1024
  workflows:
    - name: "single_agent"
      tasks:
        - agent_profile: "default"
