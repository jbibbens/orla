# Orla agentic daemon + vLLM (OpenAI-compatible). Run: docker compose -f deploy/docker-compose.vllm.yaml up -d
# Requires GPU. Default model: Qwen/Qwen3-4B-Instruct-2507. Daemon API: http://localhost:8081.
# Edit deploy/orla-vllm.yaml so agentic_serving.llm_servers[0].model matches the model vLLM serves.

services:
  vllm:
    image: vllm/vllm-openai:latest
    container_name: orla-vllm
    ports:
      - "8000:8000"
    environment:
      - HF_TOKEN=${HF_TOKEN:-}
    volumes:
      - vllm_cache:/root/.cache/huggingface
    command: ["--model", "${VLLM_MODEL:-Qwen/Qwen3-4B-Instruct-2507}"]
    ipc: host
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  orla:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: orla-daemon-vllm
    command: ["daemon", "--config", "/config/orla.yaml"]
    ports:
      - "8081:8081"
    volumes:
      - ./orla-vllm.yaml:/config/orla.yaml:ro
    depends_on:
      - vllm
    restart: unless-stopped

volumes:
  vllm_cache: {}
