# Orla agentic daemon + vLLM (OpenAI-compatible). Run: docker compose -f deploy/docker-compose.vllm.yaml up -d
# Requires GPU. Default model: Qwen/Qwen3-4B-Instruct-2507. Daemon API: http://localhost:8081.
# Ensure deploy/orla-vllm.yaml exists and the Orla server has a backend registered for the vLLM endpoint (see deploy/README.md).

services:
  vllm:
    image: vllm/vllm-openai:latest
    container_name: orla-vllm
    ports:
      - "8000:8000"
    volumes:
      - vllm_cache:/root/.cache/huggingface
    command: ["--model", "${VLLM_MODEL:-Qwen/Qwen3-4B-Instruct-2507}"]
    ipc: host
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 120s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  orla:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: orla-daemon-vllm
    command: ["serve", "--config", "/config/orla.yaml"]
    ports:
      - "8081:8081"
    volumes:
      - ./orla-vllm.yaml:/config/orla.yaml:ro
    depends_on:
      vllm:
        condition: service_healthy
    restart: unless-stopped

volumes:
  vllm_cache: {}
