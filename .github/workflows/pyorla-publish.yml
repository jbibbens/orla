# Publish pyorla to PyPI when a release tag is pushed.
#
# Tag format: pyorla-vMAJOR.MINOR.PATCH (must match version in pyorla/pyproject.toml).
#
# One-time PyPI setup (project admin):
# 1. Create the pyorla project on https://pypi.org if it does not exist.
# 2. Publishing settings → Add Trusted Publisher → GitHub:
#    Owner: harvard-cns, Repository: orla, Workflow: pyorla-publish.yml, Environment: pypi
# 3. GitHub repo → Settings → Environments → pypi (optional protection rules).
#
name: pyorla publish

on:
  push:
    tags:
      - "pyorla-v*"

permissions:
  contents: read

jobs:
  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: pyorla
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Sync, verify, build
        run: |
          uv sync --all-groups
          uv run ty check
          uv run pytest
          uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: pyorla/dist/
