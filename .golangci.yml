version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: none
  enable:
    - bodyclose
    - copyloopvar
    - errcheck
    - errorlint
    - gosec
    - govet
    - ineffassign
    - misspell
    - staticcheck
    - unused

  settings:
    gosec:
      excludes:
        - G204  # subprocess with variable — N/A (we don't shell out)
        - G115  # int conversions are validated at boundaries

  exclusions:
    rules:
      - path: _test\.go
        linters:
          - bodyclose
          - errcheck
          - gosec
